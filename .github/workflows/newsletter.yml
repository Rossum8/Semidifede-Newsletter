name: Generate Weekly Newsletter

on:
  schedule:
    # Run every Thursday at 08:00 UTC
    - cron: '0 8 * * 4'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run newsletter generation script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
        
      - name: Commit and Push Draft
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add drafts/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add new newsletter draft" && git push)
